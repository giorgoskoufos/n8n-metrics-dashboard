<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>n8n Metrics Monitor</title>
    <script src="logic/guard.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Open Sans"', 'sans-serif'] },
                    colors: {
                        n8n: { dark: '#171717', card: '#222222', primary: '#ff6f5c', success: '#278250', danger: '#f16a75', text: '#eeeeee' }
                    }
                }
            }
        }
    </script>
    
    <style>
        body { background-color: #171717; color: #eeeeee; }
        .status-success { background-color: rgba(39, 130, 80, 0.2); color: #4ade80; }
        .status-error { background-color: rgba(241, 106, 117, 0.2); color: #f87171; }
        .tab-btn.active { border-bottom: 2px solid #ff6f5c; color: #ff6f5c; }
    </style>
    <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets//favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets//favicon-16x16.png">
    <link rel="manifest" href="assets//site.webmanifest">
</head>
<body class="p-4 md:p-8">
    
    <div class="max-w-7xl mx-auto">
        
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
            <div>
                <h1 class="text-2xl font-bold text-white">n8n Dashboard</h1>
                <p class="text-gray-400">Real-time workflow analytics</p>
            </div>
            <a href="pages/chat.html" target="_blank" class="flex items-center gap-2 bg-indigo-600 hover:bg-indigo-500 text-white px-5 py-2.5 rounded-lg font-semibold transition-colors border border-indigo-500">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                Ask AI Assistant
            </a>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-n8n-card p-6 rounded-xl border border-gray-800">
                <p class="text-gray-400 text-sm mb-1">Total Executions</p>
                <h2 id="totalExecutions" class="text-3xl font-bold text-white">0</h2>
            </div>
            <div class="bg-n8n-card p-6 rounded-xl border border-gray-800">
                <p class="text-gray-400 text-sm mb-1">Errors</p>
                <h2 id="errorCount" class="text-3xl font-bold text-n8n-danger">0</h2>
            </div>
            <div class="bg-n8n-card p-6 rounded-xl border border-gray-800">
                <p class="text-gray-400 text-sm mb-1">Avg. Duration</p>
                <h2 id="avgDuration" class="text-3xl font-bold text-n8n-primary">0s</h2>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
            
            <div class="lg:col-span-2 bg-n8n-card p-6 rounded-xl border border-gray-800 h-80 flex flex-col">
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-4 gap-2">
                    <h3 class="text-sm font-semibold text-gray-400">Execution Timeline</h3>
                    <div class="flex gap-2">
                        <select id="workflowFilter" class="bg-black/30 border border-gray-700 rounded-lg px-3 py-1 text-sm focus:outline-none focus:border-n8n-primary max-w-[200px] truncate">
                            <option value="">All Workflows</option>
                        </select>
                        <select id="timeRangeFilter" class="bg-black/30 border border-gray-700 rounded-lg px-3 py-1 text-sm focus:outline-none focus:border-n8n-primary">
                            <option value="24h">Last 24h</option>
                            <option value="48h">Last 48h</option>
                            <option value="7d">Last 7 Days</option>
                        </select>
                    </div>
                </div>
                <div class="flex-1 relative">
                    <canvas id="lineChart"></canvas>
                </div>
            </div>

            <div class="bg-n8n-card p-6 rounded-xl border border-gray-800 h-80 flex flex-col">
                <h3 class="text-sm font-semibold mb-4 text-gray-400">Top Workflows</h3>
                <div class="flex-1 relative min-h-0">
                    <canvas id="doughnutChart"></canvas>
                </div>
                <div id="doughnutLegend"></div>
            </div>
            
        </div> <div class="bg-n8n-card rounded-xl border border-gray-800 overflow-hidden">
            <div class="flex border-b border-gray-800">
                <button onclick="switchTab('executions')" class="tab-btn active px-6 py-4 text-sm font-medium">Executions</button>
                <button onclick="switchTab('slowest')" class="tab-btn px-6 py-4 text-sm font-medium">Slowest (7d)</button>
                <button onclick="switchTab('errors')" class="tab-btn px-6 py-4 text-sm font-medium">Error Hotspots</button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead id="tableHeader" class="bg-black/20">
                        <tr class="text-gray-400 text-sm">
                            <th class="p-4">ID</th>
                            <th class="p-4">Workflow</th>
                            <th class="p-4">Status</th>
                            <th class="p-4">Time</th>
                            <th class="p-4">Duration</th>
                        </tr>
                    </thead>
                    <tbody id="executionsTableBody"></tbody>
                </table>
                <div id="scrollTrigger" class="h-10 text-center text-gray-500 text-sm py-2"></div>
            </div>
        </div> </div> <div id="errorModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 hidden items-center justify-center p-4">
        <div class="bg-n8n-card border border-gray-700 rounded-2xl w-full max-w-lg overflow-hidden shadow-2xl">
            <div class="p-6 border-b border-gray-800 flex justify-between items-center">
                <h3 class="text-xl font-bold text-n8n-danger">Error Details</h3>
                <button onclick="closeErrorModal()" class="text-gray-400 hover:text-white text-3xl font-bold leading-none">&times;</button>
            </div>
            <div class="p-6">
                <p class="text-sm text-gray-400 mb-4">Execution ID: <span id="modalExecId" class="text-white font-mono"></span></p>
                <div id="modalErrorMessage" class="bg-black/30 p-4 rounded-lg border border-red-900/30 text-red-400 font-mono text-sm leading-relaxed mb-6">Loading...</div>
                <div class="flex justify-end">
                    <a id="n8nLink" href="#" target="_blank" class="bg-[#ff6f5c] hover:bg-opacity-90 text-white px-6 py-2 rounded-lg font-bold transition-all">Open in n8n</a>
                </div>
            </div>
        </div>
    </div>

    <script src="logic/app.js"></script>

</body>
</html>
