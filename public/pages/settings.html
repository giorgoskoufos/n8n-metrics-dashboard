<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover, interactive-widget=resizes-content">
    <title>Settings | n8n Analytics</title>
    
    <script src="../logic/guard.js"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Open Sans"', 'sans-serif'] },
                    colors: {
                        n8n: { dark: '#171717', card: '#222222', primary: '#ff6f5c', text: '#eeeeee', hover: '#333333' }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #171717; color: #eeeeee; -webkit-font-smoothing: antialiased; }
    </style>
    <link rel="apple-touch-icon" sizes="180x180" href="../assets/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../assets/favicon-16x16.png">
    <link rel="manifest" href="../assets/site.webmanifest">
</head>
<body class="p-4 md:p-8">
    <!-- Backdrop Overlay -->
    <div id="burgerOverlay" class="fixed inset-0 bg-n8n-dark/40 backdrop-blur-md z-40 hidden opacity-0 transition-opacity duration-300"></div>
    
    <div class="max-w-4xl mx-auto">
        
        <header class="flex flex-row justify-between items-center mb-8 gap-4 relative z-50">
            <div class="relative">
                <button id="burgerBtn" class="p-3 text-gray-400 hover:text-white transition-colors bg-n8n-card border border-gray-700 rounded-lg focus:outline-none flex items-center justify-center">
                    <i class="fa-solid fa-bars fa-fw text-lg"></i>
                </button>
                <div id="burgerMenu" class="absolute left-0 mt-2 w-56 bg-n8n-card border border-gray-700 rounded-lg shadow-2xl hidden flex-col z-50 overflow-hidden divide-y divide-gray-800">
                    <a href="../index.html" class="px-4 py-3 text-sm text-gray-300 hover:bg-gray-800 hover:text-white transition-colors flex items-center">
                        <i class="fa-solid fa-chart-pie fa-fw mr-3 w-4"></i>Dashboard
                    </a>
                    <a href="roi.html" class="px-4 py-3 text-sm text-gray-300 hover:bg-gray-800 hover:text-white transition-colors flex items-center">
                        <i class="fa-solid fa-clock fa-fw mr-3 w-4 text-green-400"></i>ROI Analytics
                    </a>
                    <a href="settings.html" class="px-4 py-3 text-sm text-gray-300 hover:bg-gray-800 hover:text-white transition-colors flex items-center">
                        <i class="fa-solid fa-gear fa-fw mr-3 w-4 text-gray-400"></i>Settings
                    </a>
                    <button onclick="logout()" class="w-full text-left px-4 py-3 text-sm text-red-400 hover:bg-red-900/30 hover:text-red-300 transition-colors flex items-center bg-red-900/10">
                        <i class="fa-solid fa-right-from-bracket fa-fw mr-3 w-4"></i>Logout
                    </button>
                </div>
            </div>
            <div class="text-right">
                <h1 class="text-xl md:text-2xl font-bold text-white">Settings</h1>
                <p class="text-xs md:text-sm text-gray-400">Manage ROI & Preferences</p>
            </div>
        </header>

        <section class="bg-n8n-card border border-gray-800 rounded-xl shadow-sm overflow-hidden mb-6">
            <!-- Accordion Header -->
            <button id="roiToggle" class="w-full p-6 flex justify-between items-center bg-n8n-card hover:bg-gray-800/50 transition-colors focus:outline-none group">
                <div class="text-left">
                    <h2 class="text-lg font-bold text-white flex items-center gap-2">
                        <i class="fa-solid fa-clock-rotate-left text-green-400"></i> Workflow Time Savings
                    </h2>
                    <p class="text-xs text-gray-400 mt-1">Configure automation ROI metrics</p>
                </div>
                <i id="roiArrow" class="fa-solid fa-chevron-down transition-transform duration-300"></i>
            </button>

            <!-- Accordion Content -->
            <div id="roiContent" class="hidden border-t border-gray-800 p-6 transition-all duration-300">
                <p class="text-sm text-gray-400 mb-6 font-medium">Specify how much manual time (in seconds) is saved each time a workflow executes successfully. This is used to calculate the Total ROI in the Analytics dashboard.</p>
                
                <div id="settingsContainer" class="flex flex-col gap-3">
                    <div class="text-center py-8 text-gray-500 text-sm"><i class="fa-solid fa-spinner fa-spin mr-2"></i>Loading workflows...</div>
                </div>

                <div class="mt-8 flex justify-end">
                    <button id="saveBtn" class="bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-2.5 px-8 rounded-lg transition-all flex items-center gap-2 shadow-lg disabled:opacity-50">
                        <i class="fa-solid fa-floppy-disk"></i> Save Settings
                    </button>
                </div>
            </div>
        </section>

    </div>

    <!-- Scripts -->
    <script src="../logic/app.js"></script>
    <script src="../logic/settings.js"></script>
    <script>
        // Burger Menu Toggle Logic
        const burgerBtn = document.getElementById('burgerBtn');
        const burgerMenu = document.getElementById('burgerMenu');
        const burgerOverlay = document.getElementById('burgerOverlay');
        
        function toggleMenu(show) {
            if (show) {
                burgerMenu.classList.remove('hidden');
                burgerMenu.classList.add('flex');
                burgerOverlay.classList.remove('hidden');
                setTimeout(() => burgerOverlay.classList.add('opacity-100'), 10);
            } else {
                burgerMenu.classList.add('hidden');
                burgerMenu.classList.remove('flex');
                burgerOverlay.classList.remove('opacity-100');
                setTimeout(() => burgerOverlay.classList.add('hidden'), 300);
            }
        }

        burgerBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            const isHidden = burgerMenu.classList.contains('hidden');
            toggleMenu(isHidden);
        });

        // Close menu when clicking outside or on overlay
        document.addEventListener('click', (e) => {
            if (!burgerBtn.contains(e.target) && !burgerMenu.contains(e.target)) {
                toggleMenu(false);
            }
        });

        burgerOverlay.addEventListener('click', () => toggleMenu(false));

        // ROI Accordion Toggle
        const roiToggle = document.getElementById('roiToggle');
        const roiContent = document.getElementById('roiContent');
        const roiArrow = document.getElementById('roiArrow');

        roiToggle.addEventListener('click', () => {
            const isHidden = roiContent.classList.toggle('hidden');
            if (!isHidden) {
                roiArrow.classList.add('rotate-180');
            } else {
                roiArrow.classList.remove('rotate-180');
            }
        });

        // Auto-expand on first load for better UX
        setTimeout(() => {
            roiContent.classList.remove('hidden');
            roiArrow.classList.add('rotate-180');
        }, 300);
    </script>
</body>
</html>
