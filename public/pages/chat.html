<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Analytics Chat</title>
    <script src="../logic/guard.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Open Sans"', 'sans-serif'] },
                    colors: {
                        n8n: { dark: '#171717', card: '#222222', primary: '#ff6f5c' }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #171717; color: #eeeeee; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        .chat-container { flex: 1; overflow-y: auto; scroll-behavior: smooth; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
    </style>
</head>
<body class="bg-n8n-dark text-white">

    <header class="bg-n8n-card border-b border-gray-800 p-4 shadow-md flex justify-between items-center z-10">
        <div class="flex items-center gap-3">
            <div class="bg-indigo-600 w-10 h-10 flex items-center justify-center rounded-lg">
                <i class="fa-solid fa-chart-line fa-fw text-white"></i>
            </div>
            <div>
                <h1 class="text-lg font-bold">n8n Data Analyst</h1>
                <p class="text-xs text-gray-400">Powered by AI</p>
            </div>
        </div>
        <button onclick="window.close()" class="text-gray-400 hover:text-white transition-colors text-sm">
            <i class="fa-solid fa-xmark fa-fw mr-1"></i>Close
        </button>
    </header>

    <main id="chatBox" class="chat-container p-4 md:p-8 max-w-4xl mx-auto w-full flex flex-col gap-6">
        
        <div class="flex gap-4 items-start">
            <div class="bg-indigo-600/20 border border-indigo-500/30 w-10 h-10 shrink-0 flex items-center justify-center rounded-full mt-1">
                <i class="fa-solid fa-robot fa-fw text-indigo-400 text-lg"></i>
            </div>
            <div class="bg-n8n-card border border-gray-800 p-4 rounded-2xl rounded-tl-none max-w-[85%] shadow-sm">
                <p class="text-sm leading-relaxed">Hi! I'm your AI assistant. I can analyze your n8n database and give you insights.<br><br>Try asking me:<br><span class="text-gray-400 italic">"Which workflow had the most errors yesterday?"</span></p>
            </div>
        </div>

    </main>

    <footer class="bg-n8n-dark border-t border-gray-800 p-4 shrink-0">
        <div class="max-w-4xl mx-auto relative">
            <textarea id="userInput" rows="1" placeholder="Ask something about your data..." 
                      class="block w-full bg-n8n-card border border-gray-700 rounded-xl pl-4 pr-12 py-3 text-sm focus:outline-none focus:border-indigo-500 resize-none overflow-hidden transition-all"></textarea>
            
            <button id="sendBtn" class="absolute right-2 bottom-2 w-8 h-8 flex items-center justify-center bg-indigo-600 hover:bg-indigo-500 text-white rounded-lg transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                <i class="fa-solid fa-paper-plane fa-fw text-sm"></i>
            </button>
        </div>
        <p class="text-center text-xs text-gray-500 mt-3">AI can make mistakes. Always verify the results.</p>
    </footer>

    <script src="../logic/chat.js"></script>
</body>
</html>
