<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - n8n Analytics</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Open Sans"', 'sans-serif'] },
                    colors: {
                        n8n: { dark: '#171717', card: '#222222', primary: '#ff6f5c', text: '#eeeeee' }
                    }
                }
            }
        }
    </script>
    <link rel="apple-touch-icon" sizes="180x180" href="../assets/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="../assets//favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../assets//favicon-16x16.png">
    <link rel="manifest" href="../assets//site.webmanifest">
    <style>
        body { background-color: #171717; color: #eeeeee; }
    </style>
</head>
<body class="h-screen flex items-center justify-center p-4">

    <div class="bg-n8n-card border border-gray-800 rounded-2xl w-full max-w-md overflow-hidden shadow-2xl p-8">
        <div class="text-center mb-8">
            <div class="bg-n8n-primary/20 w-16 h-16 rounded-xl flex items-center justify-center mx-auto mb-4 border border-n8n-primary/30">
                <i class="fa-solid fa-chart-line text-n8n-primary text-3xl"></i>
            </div>
            <h2 class="text-2xl font-bold text-white mb-2">n8n Analytics</h2>
            <p class="text-gray-400 text-sm">Συνδέσου με τα στοιχεία του n8n σου</p>
        </div>
        
        <form id="loginForm">
            <div class="mb-4">
                <label class="block text-gray-400 text-sm font-medium mb-2" for="email">Email</label>
                <input type="email" id="email" required class="w-full bg-black/50 border border-gray-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-n8n-primary transition-colors" placeholder="name@company.com">
            </div>
            <div class="mb-6">
                <label class="block text-gray-400 text-sm font-medium mb-2" for="password">Password</label>
                <input type="password" id="password" required class="w-full bg-black/50 border border-gray-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-n8n-primary transition-colors" placeholder="••••••••">
            </div>
            
            <div id="loginError" class="hidden bg-red-900/30 border border-red-900/50 text-red-400 text-sm rounded-lg p-3 mb-6 text-center"></div>
            
            <button type="submit" id="loginBtn" class="w-full bg-n8n-primary hover:bg-opacity-90 text-white font-bold py-3 px-4 rounded-lg transition-all flex justify-center items-center gap-2">
                <span>Σύνδεση</span>
                <i class="fa-solid fa-arrow-right text-sm"></i>
            </button>
        </form>
    </div>

    <script src="../logic/login.js"></script>
</body>
</html>
